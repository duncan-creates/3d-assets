<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="cube11.glb"
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        /* Starting camera position */
        camera-orbit="0deg 75deg auto"
        
        /* Pitch limits */
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        
        disable-zoom>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#viewer');
        const defaultOrbit = "0deg 75deg auto";
        let resetTimer = null;

        function handleUserRelease() {
            // Clear any pending reset if the user drags again
            clearTimeout(resetTimer);

            // Wait 2.5 seconds after user releases touch/mouse
            resetTimer = setTimeout(() => {
                // 1. Pause auto-rotate so it releases control of the camera
                modelViewer.removeAttribute('auto-rotate');

                // 2. Set the camera back to your target orbit
                modelViewer.cameraOrbit = defaultOrbit;

                // 3. Re-enable auto-rotate after the transition completes (~800ms)
                setTimeout(() => {
                    modelViewer.setAttribute('auto-rotate', '');
                }, 800);

            }, 2500); // Delay before returning to default position
        }

        // Detect when user stops interacting
        modelViewer.addEventListener('pointerup', handleUserRelease);
        modelViewer.addEventListener('touchend', handleUserRelease);
    </script>

</body>
</html>
