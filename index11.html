<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="cube11.glb"
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        camera-orbit="0deg 75deg auto"
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        interpolation-decay="200"
        disable-zoom>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#viewer');
        const defaultOrbit = "0deg 75deg auto";
        
        // Delay set to 1 second (1000ms)
        const RESET_DELAY_MS = 1000; 

        let resetTimer = null;
        let isInteracting = false;

        // Detect when user begins dragging or touching
        modelViewer.addEventListener('pointerdown', () => {
            isInteracting = true;
            clearTimeout(resetTimer);
        });

        // Trigger 1-second countdown when user releases
        function handleUserRelease() {
            isInteracting = false;
            clearTimeout(resetTimer);

            resetTimer = setTimeout(() => {
                if (isInteracting) return;

                // Return pitch and distance to default while continuing smooth rotation
                modelViewer.cameraOrbit = defaultOrbit;

            }, RESET_DELAY_MS);
        }

        modelViewer.addEventListener('pointerup', handleUserRelease);
        modelViewer.addEventListener('touchend', handleUserRelease);
    </script>

</body>
</html>
