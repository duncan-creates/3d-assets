<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer - Isometric View</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="cube11.glb" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        <!-- Isometric default camera angle -->
        camera-orbit="45deg 55deg auto"
        
        <!-- Pitch constraints around isometric angle -->
        min-camera-orbit="-infinity 30deg auto"
        max-camera-orbit="infinity 90deg auto"
        
        disable-zoom>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#viewer');
        // Matches the isometric camera-orbit above
        const defaultOrbit = "45deg 55deg auto";
        let resetTimer = null;

        function handleUserRelease() {
            clearTimeout(resetTimer);

            resetTimer = setTimeout(() => {
                // Pause auto-rotate to allow camera override
                modelViewer.removeAttribute('auto-rotate');

                // Return camera to isometric position
                modelViewer.cameraOrbit = defaultOrbit;

                // Resume auto-rotate after transition completes
                setTimeout(() => {
                    modelViewer.setAttribute('auto-rotate', '');
                }, 800);

            }, 2500);
        }

        modelViewer.addEventListener('pointerup', handleUserRelease);
        modelViewer.addEventListener('touchend', handleUserRelease);
    </script>

</body>
</html>
