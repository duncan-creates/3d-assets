<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <!-- Imports the model-viewer component -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; }
        model-viewer { width: 100%; height: 100%; background-color: #272727; }
    </style>
</head>
<body>

    <!-- Swap out the src URL with your actual GitHub Pages GLB URL -->
    <model-viewer 
        src="https://https://duncan-creates.github.io/3d-assets/cube01.glb" 
        ar 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1">
    </model-viewer>

</body>
</html>
