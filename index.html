<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="https://duncan-creates.github.io/3d-assets/cube01.glb" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        /* DEFAULT CAMERA ANGLE: (Azimuth/Yaw, Pitch, Distance) */
        camera-orbit="0deg 75deg auto"
        
        /* Pitch boundaries */
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        
        disable-zoom
        interpolation-decay="200">
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#viewer');
        const defaultOrbit = "0deg 75deg auto"; // Change this to your preferred default angle
        let userInteractionTimer = null;

        // Listen for when the user starts interacting
        modelViewer.addEventListener('camera-change', (event) => {
            if (event.detail.source === 'user-interaction') {
                // Clear any running timer while the user is actively dragging
                clearTimeout(userInteractionTimer);

                // Set a 2.5-second delay after the user stops dragging
                userInteractionTimer = setTimeout(() => {
                    // Smoothly animate the camera back to the default orbit angle
                    modelViewer.cameraOrbit = defaultOrbit;
                }, 2500); // Time in milliseconds before returning to default
            }
        });
    </script>

</body>
</html>
