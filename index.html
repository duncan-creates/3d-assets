<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            /* Makes the viewer background completely transparent */
            --background-color: transparent; 
            background-color: transparent;
        }
    </style>
</head>
<body>

    <!-- Swap out the src URL with your actual GitHub Pages GLB URL -->
    <model-viewer 
        src="https://yourusername.github.io/your-repo/model.glb" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        
        /* 1. Idle Rotation Settings */
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        /* 2. Restrict to Horizontal (Orbit) Rotation Only */
        min-camera-orbit="auto auto auto"
        max-camera-orbit="auto auto auto"
        
        /* 3. Disable Zooming (Optional but recommended for a cleaner card look) */
        disable-zoom>
    </model-viewer>

</body>
</html>
