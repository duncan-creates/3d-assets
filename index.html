<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        id="viewer"
        src="https://duncan-creates.github.io/3d-assets/cube01.glb" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        /* DEFAULT CAMERA ANGLE */
        camera-orbit="0deg 75deg auto"
        
        /* Pitch limits (allows viewing top without going full 90 degrees overhead) */
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        
        disable-zoom>
    </model-viewer>

    <script>
const modelViewer = document.querySelector('#viewer');
    const defaultOrbit = "0deg 75deg auto";
    let interactionTimer = null;

    // Function to execute the camera reset
    function scheduleCameraReset() {
        // Clear any previous timer if user drags again
        clearTimeout(interactionTimer);

        // Wait 2.5 seconds after user releases touch/mouse
        interactionTimer = setTimeout(() => {
            // 1. Reset the turntable back to 0 degrees
            if (typeof modelViewer.resetTurntableRotation === 'function') {
                modelViewer.resetTurntableRotation();
            }
            
            // 2. Animate the camera orbit back to the default pitch and position
            modelViewer.cameraOrbit = defaultOrbit;
        }, 2500); 
    }

    // Listen for mouse/touch releases on the viewer
    modelViewer.addEventListener('pointerup', scheduleCameraReset);
    modelViewer.addEventListener('touchend', scheduleCameraReset);
    </script>

</body>
</html>
