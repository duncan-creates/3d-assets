<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Model Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;

            /* Hide hand prompt via CSS variables */
            --interaction-prompt-display: none;
        }

        /* Direct shadow DOM target to strip interaction prompt */
        model-viewer::part(interaction-prompt) {
            display: none !important;
        }
    </style>
</head>
<body>

    <model-viewer 
        src="https://duncan-creates.github.io/3d-assets/cube01.glb" 
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        disable-zoom>
    </model-viewer>

</body>
</html>
