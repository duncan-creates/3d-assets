<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Framing 3D Model Viewer</title>

    <link rel="modulepreload" href="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js">
    <link rel="preload" href="model13.glb" as="fetch" crossorigin="anonymous">

    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>

    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: transparent; 
        }
        model-viewer { 
            width: 100%; 
            height: 100%; 
            --background-color: transparent; 
            background-color: transparent;
            --interaction-prompt-display: none;
            --poster-color: transparent;
        }

        model-viewer::part(interaction-prompt) {
            display: none !important;
        }

        #progress-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 0%;
            height: 2px;
            background-color: #000;
            opacity: 0.6;
            transition: width 0.15s ease, opacity 0.4s ease;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div id="progress-bar"></div>

    <model-viewer 
        id="viewer"
        src="model13.glb"
        loading="eager"
        reveal="auto"
        render-scale="1"
        bounds="tight"
        camera-controls 
        touch-action="pan-y" 
        shadow-intensity="1"
        exposure="1"
        environment-image="neutral"
        interaction-prompt="none"
        auto-rotate 
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        
        /* Let the camera set target automatically */
        camera-target="auto auto auto"
        camera-orbit="0deg 75deg auto"
        
        min-camera-orbit="-infinity 45deg auto"
        max-camera-orbit="infinity 90deg auto"
        interpolation-decay="200"
        disable-pan
        disable-tap
        disable-zoom>
    </model-viewer>

    <script>
        const modelViewer = document.querySelector('#viewer');
        const progressBar = document.querySelector('#progress-bar');
        
        let defaultOrbit = "0deg 75deg auto";
        const RESET_DELAY_MS = 1000; 

        let resetTimer = null;
        let isInteracting = false;
        let startX = 0;
        let startY = 0;

        // Force model auto-fit & framing when loading completes
        modelViewer.addEventListener('load', () => {
            // Re-calculate the camera bounding box distance automatically
            if (typeof modelViewer.updateFraming === 'function') {
                modelViewer.updateFraming();
            }
            
            // Save the newly calculated framing orbit as the default reset target
            defaultOrbit = modelViewer.getCameraOrbit().toString();
        });

        // Loading Progress Bar
        modelViewer.addEventListener('progress', (e) => {
            const progress = e.detail.totalProgress * 100;
            progressBar.style.width = `${progress}%`;
            if (progress === 100) {
                setTimeout(() => { progressBar.style.opacity = '0'; }, 300);
            }
        });

        // Interaction state handling
        modelViewer.addEventListener('pointerdown', (e) => {
            isInteracting = true;
            startX = e.clientX;
            startY = e.clientY;
            clearTimeout(resetTimer);
        });

        modelViewer.addEventListener('click', (e) => {
            const dist = Math.hypot(e.clientX - startX, e.clientY - startY);
            if (dist < 5) {
                e.stopPropagation();
                e.preventDefault();
            }
        }, true);

        function handleUserRelease() {
            isInteracting = false;
            clearTimeout(resetTimer);

            resetTimer = setTimeout(() => {
                if (isInteracting) return;
                modelViewer.cameraOrbit = defaultOrbit;
            }, RESET_DELAY_MS);
        }

        modelViewer.addEventListener('pointerup', handleUserRelease);
        modelViewer.addEventListener('touchend', handleUserRelease);
    </script>

</body>
</html>
